<!DOCTYPE html>
<html lang="en" data-post-class="{{ page.post_class | default: 'general' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} &mdash; {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  {% feed_meta %}
</head>
<body data-post-class="{{ page.post_class | default: 'general' }}">

  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/about' | relative_url }}">about</a>
        <a href="{{ '/feed.xml' | relative_url }}">rss</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span class="site-footer__copy">&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</span>
      <span class="site-footer__links">
        {% if site.twitter_username %}
          <a href="https://twitter.com/{{ site.twitter_username }}">twitter</a>
        {% endif %}
        {% if site.github_username %}
          <a href="https://github.com/{{ site.github_username }}">github</a>
        {% endif %}
      </span>
    </div>
  </footer>

</body>
</html>
